<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Banque — QCM Maths</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="presentation.css">
<style>
/* ─── LAYOUT ─── */
header {
  position:sticky; top:0; z-index:100;
  background:var(--card); backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border2);
  padding:0 24px; height:58px;
  display:flex; align-items:center; gap:16px;
}
.logo { display:flex; align-items:center; gap:10px; font-size:15px; font-weight:700; }
.logo-badge {
  width:32px; height:32px; border-radius:8px;
  background:linear-gradient(135deg, var(--accent), var(--accent2));
  display:flex; align-items:center; justify-content:center; font-size:16px;
}
.header-stats {
  margin-left:auto; display:flex; gap:16px; align-items:center;
  font-size:12px; color:var(--text3); font-family:var(--mono);
  
}
.header-stats strong { color:var(--text2); }

.layout {
  position:relative; z-index:1;
  display:grid; grid-template-columns:260px 1fr;
  height:calc(100vh - 58px);
}

/* ─── SIDEBAR ─── */
.sidebar {
  border-right:1px solid var(--border2); display:flex; flex-direction:column;
  overflow:hidden; background:var(--card);
}
.sidebar-top { padding:14px; border-bottom:1px solid var(--border2); display:flex; flex-direction:column; gap:10px; }

.search-box {
  display:flex; align-items:center; gap:8px;
  background:var(--card2);  border-radius:8px;
  padding:8px 12px;
  
}
.search-box input {
  border:none; background:transparent; color:var(--text);
  font-family:var(--sans); font-size:13px; outline:none; flex:1;
}
.search-box input::placeholder { color:var(--text3); }
.search-icon { color:var(--text3); font-size:14px; }

.filter-row { display:flex; gap:6px; flex-wrap:wrap; }
.filter-btn {
  
  padding:4px 10px; border-radius:5px; border:1px solid var(--border2);
  background:transparent; color:var(--text3);
  font-family:var(--sans); font-size:11px; cursor:pointer; transition:all .2s;
}
.filter-btn:hover { border-color:rgba(255,255,255,.15); color:var(--text2); }
.filter-btn.active { color:#fff; border-color:transparent; }
.filter-btn[data-theme="all"].active     { background:rgba(249, 251, 255, 0.1); color:var(--text); border-color:var(--text); }
.filter-btn[data-theme="calcul"].active  { background:rgba(60, 144, 193, 0.1); color:var(--blue); border-color:var(--blue); }
.filter-btn[data-theme="proportions"].active { background:rgba(167,139,250,.1); color:var(--pur); border-color:var(--pur); }
.filter-btn[data-theme="evolutions"].active  { background:rgba(245,158,11,.1); color:var(--yellow); border-color:var(--yellow); }
.filter-btn[data-theme="fonctions"].active   { background:rgba(52,211,153,.1); color:var(--green); border-color:var(--green); }
.filter-btn[data-theme="stats"].active       { background:rgba(248,113,113,.1); color:var(--red); border-color:var(--red); }
.filter-btn[data-theme="proba"].active       { background:rgba(56,189,248,.1); color:var(--cyan); border-color:var(--cyan); }
.filter-btn[data-theme="figures"].active     { background:rgba(167,139,250,.1); color:var(--pur); border-color:var(--pur); }
.filter-btn[data-theme="Non répertoriées"].active     { background:rgba(127, 219, 127, 0.1); color:var(--autre); border-color:var(--pur);}

.q-list { flex:1; overflow-y:auto; padding:8px; }
.q-item {
  padding:10px 12px; border-radius:8px; cursor:pointer;
  border:1px solid transparent; transition:all .18s;
  margin-bottom:4px; display:flex; align-items:flex-start; gap:8px;
}
.q-item:hover { background:var(--card2); border-color:var(--border2); }
.q-item.active { background:var(--card2); border-color:var(--card); }
.q-item.selected { border-color:rgba(137,175,200,0.4); background:rgba(137,175,200,0.06); }
.q-item-check {
  flex-shrink:0; margin-top:2px;
  width:15px; height:60px; border-radius:4px;
  
  border:2px solid var(--card); background:var(--card2);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:all .15s; font-size:10px;
}
.q-item-check:hover{
  transform: scale(1.2);
  background-color: var(--text3);
}
.q-item.selected .q-item-check { background:var(--blue); border-color:var(--blue); color:var(--text); }
.q-item-content { flex:1; min-width:0; }
.q-item-id { font-family:var(--mono); font-size:11px; color:var(--text3); margin-bottom:3px; }
.q-item-preview { font-size:12px; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.q-item-tags { display:flex; gap:4px; margin-top:5px; flex-wrap:wrap; }

/* Barre de sélection bas de sidebar */
.selection-bar {
  padding:10px 14px; border-top:1px solid var(--border2);
  background:var(--card); display:flex; flex-direction: column; align-items:center; gap:8px;
  flex-shrink:0;
}
.sel-count { font-size:12px; color:var(--text2); font-family:var(--mono); flex:1; }
.sel-count span { color:var(--blue); font-weight:600; }
.btn-compile-sel {
  padding:6px 14px; border-radius:99px; border:2px solid rgba(137,175,200,0.35);
  background:rgba(137,175,200,0.1); color:var(--blue);
  font-size:12px; font-weight:500; cursor:pointer; transition:all .2s;
  font-family:var(--sans);
}
.btn-compile-sel:hover { background:rgba(137,175,200,0.2); }
.btn-compile-sel:disabled { opacity:0.4; cursor:not-allowed; }

/* Modale de compilation */
.compile-modal-bg {
  position:fixed; inset:0; z-index:9999;
  background:rgba(0,0,0,0.7); backdrop-filter:blur(4px);
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.compile-modal {
  background:var(--card); border:1px solid var(--border2);
  border-radius:12px; padding:0; max-width:700px; width:100%;
  max-height:85vh; display:flex; flex-direction:column; overflow:hidden;
  height: 80%;
}
.compile-modal-header {
  padding:16px 20px; border-bottom:1px solid var(--border2);
  display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
}
.compile-modal-title { font-weight:600; font-size:14px; }
.compile-modal-body { flex:1; overflow-y:auto; padding:16px 20px; display:flex; flex-direction:column; gap:14px; }
.compile-modal-footer {
  padding:12px 20px; border-top:1px solid var(--border2);
  display:flex; gap:8px; justify-content:flex-end; flex-shrink:0;
}
.compile-q-row {
  background:var(--card2); border-radius:8px; padding:12px 14px;
  display:flex; flex-direction:column; gap:8px;
  border:2px solid transparent; transition:border-color .15s, opacity .15s;
  user-select:none;
  cursor:grab;
}
.compile-q-row.drag-over { border-color:var(--blue); background:rgba(137,175,200,0.1); }
.compile-q-row.dragging  { opacity:0.35;  }
.compile-q-row:active{ cursor: grabbing;
    cursor: -moz-grabbing;
    cursor: -webkit-grabbing;}
.drag-handle {
  color:var(--text3); font-size:16px; cursor:grab;
  padding:0 2px; line-height:1; flex-shrink:0;
}
.drag-handle:active { cursor: grabbing;
    cursor: -moz-grabbing;
    cursor: -webkit-grabbing;}
.compile-q-id { font-family:var(--mono); font-size:11px; color:var(--text3); }
.compile-q-enonce { font-size:13px; color:var(--text2); line-height:1.5; }
.compile-q-vars { display:flex; flex-wrap:wrap; gap:6px; margin-top:2px; }
.compile-var-item { display:flex; align-items:center; gap:4px; }
.compile-var-label { font-family:var(--mono); font-size:11px; color:var(--blue); }
.compile-var-input {
  width:52px; padding:3px 6px; border-radius:5px;
  background:var(--card); border:1px solid var(--border2);
  color:var(--text); font-family:var(--mono); font-size:12px;
  outline:none; text-align:center;
}
.compile-var-input:focus { border-color:rgba(137,175,200,0.5); }
.btn-order {
  padding:2px 8px; border-radius:4px; border:2px solid var(--card);
  background:var(--card); color:var(--text3); font-size:11px; cursor:pointer;
  transition: all .15s; 
}
.btn-order:hover { color:var(--text);
transform: scale(1.2); border-color: var(--red);}

.no-results { padding:24px; text-align:center; color:var(--text3); font-size:13px; }
.tag {
  
  font-size:10px; font-family:var(--mono); padding:2px 7px;
  border-radius:99px; border:1px solid; white-space:nowrap;
}

/* ─── MAIN PANEL ─── */
.main-panel {
  overflow-y: auto;
  display: flex;
  flex-direction: column;
}

/* Header de la question (titre + actions) */
.q-top-bar {
  padding: 18px 28px 16px;
  border-bottom: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: space-between; gap: 16px;
  flex-shrink: 0;
  background: var(--bg);
  position: sticky; top: 0; z-index: 10;
}
.q-detail-id { font-family:var(--mono); font-size:12px; color:var(--text3); }
.q-detail-title { font-size:20px; font-weight:700; letter-spacing:-.3px; margin-top:2px; }
.q-actions { display:flex; gap:8px; flex-shrink:0; }

/* Corps pleine largeur */
.q-body {
  display: flex;
  flex: 1;
  min-height: 0;
}

/* Prévisualisation pleine largeur */
.q-preview-col {
  padding: 28px 40px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
  flex: 1;
}

/* ─── EMPTY STATE ─── */
.empty-state {
  flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center;
  gap:12px; color:var(--text3); text-align:center;
}
.empty-icon { font-size:48px; opacity:.4; }
.empty-state p { font-size:14px; max-width:280px; line-height:1.6; }

/* ─── QUESTION DETAIL ─── */
.q-detail-header {
  display:flex; align-items:flex-start; justify-content:space-between; gap:16px;
}
.q-detail-id { font-family:var(--mono); font-size:13px; color:var(--text3); margin-bottom:4px; }
.q-detail-title { font-size:20px; font-weight:700; letter-spacing:-.3px; }
.q-actions { display:flex; gap:8px; flex-shrink:0; }

.btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:7px 14px; border-radius:99px;
  font-family:var(--sans); font-size:12px; font-weight:500;
  cursor:pointer; 
  background:var(--card); color:var(--text2); transition:all .2s;
}
.btn:hover { color:var(--text); }
.btn-blue { background:rgba(60, 84, 193, 0.12);  color:var(--text); }
.btn-blue:hover { background:rgba(60, 133, 193, 0.2); }
.btn-green { background:rgba(109,184,146,.1);  color:var(--green); }
.btn-green:hover { background:rgba(52,211,153,.18); }


/* ─── PREVIEW ─── */
.preview-label {
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .08em; color: var(--text3);
  display: flex; align-items: center; justify-content: space-between;
}
.vars-pill-row {
  display: flex; gap: 6px; flex-wrap: wrap;
}
.var-pill {
  font-family: var(--mono); font-size: 11px; padding: 3px 9px;
  border-radius: 99px; 
  background: rgba(79,142,247,.08); color: var(--text2);
}

.rendered-q { display: flex; flex-direction: column; gap: 20px; }
.rendered-enonce { font-size: 18px; line-height: 2.1; }
.rendered-answers { display: grid; gap: 12px; }
.rendered-answer {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 20px; border-radius: 12px; 
  background: var(--card2); font-size: 15px; line-height: 1.7;
  box-shadow: 5px 5px 5px rgba(0, 0, 0, 0.103);
}
.rendered-answer.correct { border-color: var(--green); background: rgba(52,211,153,.08); }
.answer-letter-badge {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--mono); font-size: 13px; font-weight: 600;
  color:var(--bg);
  background: var(--text); 
}
.correct .answer-letter-badge { background: var(--green); border-color: var(--green); color: #000; }

.variants-row { display: flex; gap: 6px; flex-wrap: wrap; padding-top: 20px; border-top: 1px solid var(--border2); }
.variant-preview-box {
  background: var(--card2); border: 1px solid var(--border2); border-radius: 10px;
  padding: 16px 20px; margin-top: 14px;
}
.variant-preview-box .rendered-enonce { font-size: 15px; line-height: 1.9; }
.variant-preview-box .rendered-answer { font-size: 13px; padding: 10px 14px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <!-- <div class="logo-badge">📁</div> -->
    Banque de questions
  </div>
  <div class="header-stats" id="headerStats">Chargement…</div>
</header>

<div class="layout">
  <!-- ── SIDEBAR ── -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="Rechercher par id, énoncé…" oninput="filterList()">
      </div>
      <div class="filter-row" id="filterRow">
        <button class="filter-btn active" data-theme="all" onclick="setTheme('all',this)">Tous</button>
        <button class="filter-btn" data-theme="calcul" onclick="setTheme('calcul',this)">Calcul</button>
        <button class="filter-btn" data-theme="proportions" onclick="setTheme('proportions',this)">Prop.</button>
        <button class="filter-btn" data-theme="evolutions" onclick="setTheme('evolutions',this)">Évol.</button>
        <button class="filter-btn" data-theme="fonctions" onclick="setTheme('fonctions',this)">Fonctions</button>
        <button class="filter-btn" data-theme="stats" onclick="setTheme('stats',this)">Stats</button>
        <button class="filter-btn" data-theme="proba" onclick="setTheme('proba',this)">Proba</button>
        <button class="filter-btn" data-theme="Autre" onclick="setTheme('Non répertoriées',this)">Autre</button>
      </div>
    </div>
    <div class="q-list" id="qList"></div>
    <div class="selection-bar">
      <div class="sel-count"><span id="selCount">0</span> sélectionnée(s)</div>
      <div> 
      <button class="btn-compile-sel" id="btnPressSel" onclick="startPresentation()" disabled>🖥️ Présenter</button>
      <button class="btn-compile-sel" id="btnCompileSel" onclick="openCompileModal()" disabled>📄 Compiler</button>
      </div>
    </div>
  </aside>

  <!-- ── MAIN PANEL ── -->
  <main class="main-panel" id="mainPanel">
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">🔎</div>
      <p>Sélectionnez une question dans la liste pour afficher son détail et la prévisualiser.</p>
    </div>
  </main>
</div>

<div id="toast"></div>

<!-- Chargement des fichiers de questions -->
<script src="questions/utils.js"></script>
<script src="questions/svg-renderer.js"></script>
<script src="questions/calcul.js"></script>
<script src="questions/proportions.js"></script>
<script src="questions/evolutions.js"></script>
<script src="questions/fonctions.js"></script>
<script src="questions/stats.js"></script>
<script src="questions/proba.js"></script>
<script src="questions/autre.js"></script>
<script src="compiler.js"></script>
<script src="presentation.js"></script>

<script>
// ═══════════════════════════════════════════════════
//  DONNÉES
// ═══════════════════════════════════════════════════

// Associer chaque banque à son fichier source
const SOURCES = {
  QUESTIONS_CALCUL:      'questions/calcul.js',
  QUESTIONS_PROPORTIONS: 'questions/proportions.js',
  QUESTIONS_EVOLUTIONS:  'questions/evolutions.js',
  QUESTIONS_FONCTIONS:   'questions/fonctions.js',
  QUESTIONS_STATS:       'questions/stats.js',
  QUESTIONS_PROBA:       'questions/proba.js',
  QUESTIONS_NON_REPERTORIEES:       'questions/autre.js',
};

const BANKS = [
  { name:'QUESTIONS_CALCUL',      list: typeof QUESTIONS_CALCUL      !== 'undefined' ? QUESTIONS_CALCUL      : [] },
  { name:'QUESTIONS_PROPORTIONS', list: typeof QUESTIONS_PROPORTIONS !== 'undefined' ? QUESTIONS_PROPORTIONS : [] },
  { name:'QUESTIONS_EVOLUTIONS',  list: typeof QUESTIONS_EVOLUTIONS  !== 'undefined' ? QUESTIONS_EVOLUTIONS  : [] },
  { name:'QUESTIONS_FONCTIONS',   list: typeof QUESTIONS_FONCTIONS   !== 'undefined' ? QUESTIONS_FONCTIONS   : [] },
  { name:'QUESTIONS_STATS',       list: typeof QUESTIONS_STATS       !== 'undefined' ? QUESTIONS_STATS       : [] },
  { name:'QUESTIONS_PROBA',       list: typeof QUESTIONS_PROBA       !== 'undefined' ? QUESTIONS_PROBA       : [] },
  { name:'QUESTIONS_NON_REPERTORIEES',list: typeof QUESTIONS_NON_REPERTORIEES       !== 'undefined' ? QUESTIONS_NON_REPERTORIEES       : [] },
];

// Banque complète avec référence au fichier source
const ALL_QUESTIONS = [];
BANKS.forEach(bank => {
  bank.list.forEach(q => {
    ALL_QUESTIONS.push({ ...q, _source: SOURCES[bank.name], _bank: bank.name });
  });
});

const THEME_NAMES = {
  calcul:'Calcul', proportions:'Proportions', evolutions:'Évolutions',
  fonctions:'Fonctions', stats:'Statistiques', proba:'Probabilités', autre:'Non répertoriées'
};
const THEME_COLORS = {
  calcul:'var(--blue)', proportions:'var(--pur)', evolutions:'var(--yellow)',
  fonctions:'var(--green)', stats:'var(--red)', proba:'var(--cyan)', autre:'var(--autre)', 
};
const LEVEL_LABELS = { techno:'Techno', specifique:'Spéc.', specialite:'Spé.' };

// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════
let activeTheme   = 'all';
let activeId      = null;
let currentVars   = {};
let selectedQuestions = new Map();
let variantIdx    = 0;
let dedupGroups   = false;

// ═══════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════
function init() {
  updateStats();
  renderList(ALL_QUESTIONS);
  updateSelCount();
}

function updateStats() {
  const total = ALL_QUESTIONS.length;
  const byTheme = {};
  ALL_QUESTIONS.forEach(q => {
    byTheme[q.theme] = (byTheme[q.theme]||0) + 1;
  });
  document.getElementById('headerStats').innerHTML =
    `<strong>${total}</strong> questions &nbsp;·&nbsp; ` +
    Object.entries(byTheme).map(([t,n]) =>
      `<span style="color:${THEME_COLORS[t]||'var(--text2)'}">${THEME_NAMES[t]||t}: <strong style="color:inherit">${n}</strong></span>`
    ).join(' &nbsp;·&nbsp; ');
}

// ═══════════════════════════════════════════════════
//  LISTE
// ═══════════════════════════════════════════════════
function filtered() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  return ALL_QUESTIONS.filter(item => {
    if (activeTheme !== 'all' && item.theme !== activeTheme) return false;
    if (!q) return true;
    // Recherche sur id et aperçu de l'énoncé (sans évaluer les variables)
    const enonceStr = item.enonce.toString();
    return item.id.toLowerCase().includes(q) || enonceStr.toLowerCase().includes(q);
  });
}

function renderList(items) {
  const list = document.getElementById('qList');
  if (!items.length) {
    list.innerHTML = '<div class="no-results">Aucune question trouvée</div>';
    return;
  }
  list.innerHTML = items.map(q => {
    let preview = '—';
    try {
      const sampleVars = makeSampleVars(q.variables || {});
      preview = q.enonce(sampleVars).replace(/%%TIKZ[\s\S]*?%%ENDTIKZ%%/g, '[figure]').replace(/\$[^$]+\$/g, m => m).replace(/<[^>]+>/g,'').substring(0,60);
    } catch(e) { preview = q.id; }

    const niveaux = Array.isArray(q.niveau) ? q.niveau : [q.niveau];
    const col = THEME_COLORS[q.theme] || 'var(--text3)';
    const isSel = selectedQuestions.has(q.id);

    return `<div class="q-item${q.id===activeId?' active':''}${isSel?' selected':''}" id="item-${q.id}">
      
      <div class="q-item-content" onclick="selectQuestion('${q.id}')">
        <div class="q-item-id">${q.id}</div>
        <div class="q-item-preview">${preview}</div>
        <div class="q-item-tags">
          <span class="tag" style="border-color:${col};color:${col}">${THEME_NAMES[q.theme]||q.theme}</span>
          ${(niveaux.length===3)?`<span class="tag" style="border-color:var(--text3);color:var(--text3)"> Tous </span>` :  niveaux.map(n=>`<span class="tag" style="border-color:var(--text3);color:var(--text3)">${LEVEL_LABELS[n]||n}</span>`).join('')}
          
          ${q.groupe ? `<span class="tag" style="border-color:rgba(167,139,250,.4);color:var(--pur)"> ${q.groupe}</span>` : ''}
        </div>
      </div>
      <div class="q-item-check" onclick="toggleSelect('${q.id}',event)">${isSel ? '✓' : ''}</div>
    </div>`;
  }).join('');
}

function setTheme(theme, btn) {
  activeTheme = theme;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterList();
}

function filterList() {
  renderList(filtered());
  // Reselect active if still visible
  if (activeId) {
    const el = document.getElementById('item-'+activeId);
    if (el) el.classList.add('active');
  }
}

// ═══════════════════════════════════════════════════
//  SÉLECTION
// ═══════════════════════════════════════════════════
function selectQuestion(id) {
  activeId = id;
  variantIdx = 0;
  const q = ALL_QUESTIONS.find(x => x.id === id);
  if (!q) return;
  // Update list highlight
  document.querySelectorAll('.q-item').forEach(el => el.classList.remove('active'));
  const itemEl = document.getElementById('item-'+id);
  if (itemEl) { itemEl.classList.add('active'); itemEl.scrollIntoView({block:'nearest'}); }
  // Generate fresh vars
  currentVars = makeVars(q.variables || {});
  renderDetail(q);
}

function makeVars(variables) {
  const v = {};
  for (const [k, cfg] of Object.entries(variables)) {
    v[k] = pickVar(cfg);
  }
  return v;
}

function makeSampleVars(variables) {
  const v = {};
  for (const [k, cfg] of Object.entries(variables)) {
    v[k] = pickVar(cfg);
  }
  return v;
}

function updateSelVar(id, key, rawVal) {

function shuffleCompileModal() {
  const entries = [...selectedQuestions.entries()];
  for (let i = entries.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [entries[i], entries[j]] = [entries[j], entries[i]];
  }
  selectedQuestions = new Map(entries);
  const body = document.getElementById('compileModalBody');
  if (!body) return;
  const rows = [...body.querySelectorAll('.compile-q-row')];
  const ordered = entries.map(([id]) => rows.find(r => r.dataset.qid === id)).filter(Boolean);
  ordered.forEach(r => body.appendChild(r));
  body.querySelectorAll('.compile-q-id').forEach((el, i) => {
    const id = el.closest('.compile-q-row').dataset.qid;
    el.textContent = (i+1) + '. ' + id;
  });
}

function initDragDrop(container) {
  var dragged = null;

  container.querySelectorAll('.compile-q-row').forEach(function(row) {
    row.setAttribute('draggable', 'true');

    row.addEventListener('dragstart', function(e) {
      dragged = row;
      setTimeout(function(){ row.classList.add('dragging'); }, 0);
      e.dataTransfer.effectAllowed = 'move';
    });

    row.addEventListener('dragend', function() {
      row.classList.remove('dragging');
      container.querySelectorAll('.compile-q-row').forEach(function(r){
        r.classList.remove('drag-over');
      });
      var newMap = new Map();
      container.querySelectorAll('.compile-q-row').forEach(function(r) {
        var id = r.dataset.qid;
        if (id && selectedQuestions.has(id)) newMap.set(id, selectedQuestions.get(id));
      });
      selectedQuestions = newMap;
      container.querySelectorAll('.compile-q-id').forEach(function(el, i) {
        var id = el.closest('.compile-q-row').dataset.qid;
        el.textContent = (i+1) + '. ' + id;
      });
      dragged = null;
    });

    row.addEventListener('dragover', function(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if (row !== dragged) {
        container.querySelectorAll('.compile-q-row').forEach(function(r){ r.classList.remove('drag-over'); });
        row.classList.add('drag-over');
      }
    });

    row.addEventListener('dragleave', function() {
      row.classList.remove('drag-over');
    });

    row.addEventListener('drop', function(e) {
      e.preventDefault();
      if (dragged && row !== dragged) {
        var rows = [...container.querySelectorAll('.compile-q-row')];
        var fromIdx = rows.indexOf(dragged);
        var toIdx   = rows.indexOf(row);
        if (fromIdx < toIdx) container.insertBefore(dragged, row.nextSibling);
        else container.insertBefore(dragged, row);
      }
    });
  });
}

function cleanForDisplay(str) {
  if (typeof str !== 'string') return String(str);
  // %%SVG...%%ENDSVG%% : SVG direct depuis Fig (le %%TIKZ qui suit est pour LaTeX, on le saute)
  // Paire SVG+TIKZ (Fig) : garder le SVG, ignorer le TIKZ (qui est pour LaTeX)
  str = str.replace(/%%SVG([\s\S]*?)%%ENDSVG%%\s*%%TIKZ[\s\S]*?%%ENDTIKZ%%/g, function(_, svg) {
    return '<div style="display:flex;justify-content:center;margin:12px 0">' + svg.trim() + '</div>';
  });
  // SVG seul
  str = str.replace(/%%SVG([\s\S]*?)%%ENDSVG%%/g, function(_, svg) {
    return '<div style="display:flex;justify-content:center;margin:12px 0">' + svg.trim() + '</div>';
  });
  // TIKZ legacy → SVG via tikzToSvg
  str = str.replace(/%%TIKZ([\s\S]*?)%%ENDTIKZ%%/g, function(_, code) {
    var svg = '';
    try { svg = tikzToSvg(code.trim()); } catch(e) { svg = '<span style="color:var(--red);font-size:11px">Erreur SVG</span>'; }
    return '<div style="display:flex;justify-content:center;margin:12px 0">' + svg + '</div>';
  });
  // \\\\ → retour à la ligne, sauf dans les blocs $...$ et $$...$$
  return str.replace(/((\$\$[\s\S]*?\$\$)|(\$[^$]*?\$))|(\\\\\s*)/g, (m, math, d, i, br) => {
    if (math) return math;
    if (br)   return '<br>';
    return m;
  });
}

//  CODE SOURCE
// ═══════════════════════════════════════════════════
function buildSource(q) {
  const niveaux = Array.isArray(q.niveau) ? JSON.stringify(q.niveau) : JSON.stringify([q.niveau]);
  const vars = Object.entries(q.variables||{}).map(([k,cfg])=>
    `    ${k}: { min: ${cfg.min}, max: ${cfg.max} }`).join(',\n');
  return `  {\n    id: "${q.id}", theme: "${q.theme}",\n    niveau: ${niveaux}, cols: ${q.cols||4},\n    variables: {\n${vars}\n    },\n    enonce: ${q.enonce.toString()},\n    bonneReponse: ${q.bonneReponse.toString()},\n    distracteurs: ${q.distracteurs.toString()}\n  }`;
}

function renderSource(q) {
  const raw = buildSource(q);
  // Coloration syntaxique minimale
  return raw
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/(\/\/[^\n]*)/g,'<span class="c">$1</span>')
    .replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')/g,'<span class="s">$1</span>')
    .replace(/\b(const|let|var|function|return|if|else|for|Array|Math)\b/g,'<span class="k">$1</span>')
    .replace(/\b(\d+(?:\.\d+)?)\b(?![^<]*>)/g,'<span class="n">$1</span>');
}

// ═══════════════════════════════════════════════════
//  UTILS
// ═══════════════════════════════════════════════════
function shuffle(arr) {
  const a = [...arr];
  for (let i=a.length-1;i>0;i--) {
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

let _toastTimer;
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show ' + type;
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => { t.className = ''; }, 3000);
}

// Rendu de contenu : l'éditeur utilise cleanForDisplay (string→HTML)
function presRenderContent(container, str) {
  if (typeof str !== 'string') { container.textContent = String(str); return; }
  const parts = str.split(/(%%SVG[\s\S]*?%%ENDSVG%%(?:\s*%%TIKZ[\s\S]*?%%ENDTIKZ%%)?|%%TIKZ[\s\S]*?%%ENDTIKZ%%)/);
  parts.forEach(part => {
    if (part.startsWith('%%SVG')) {
      const svgCode = part.replace(/^%%SVG/, '').replace(/%%ENDSVG%%[\s\S]*$/, '').trim();
      const wrap = document.createElement('div');
      wrap.className = 'fig-wrap';
      wrap.innerHTML = svgCode;
      container.appendChild(wrap);
    } else if (part.startsWith('%%TIKZ')) {
      const code = part.replace(/^%%TIKZ/, '').replace(/%%ENDTIKZ%%$/, '').trim();
      const wrap = document.createElement('div');
      wrap.className = 'fig-wrap';
      try { wrap.innerHTML = tikzToSvg(code); } catch(e) { wrap.textContent = '[figure]'; }
      container.appendChild(wrap);
    } else if (part) {
      const span = document.createElement('span');
      const safe = part.replace(/((\$\$[\s\S]*?\$\$)|(\$[^$]*?\$))|(\\\\\s*)/g, (m, math, d, i, br) => {
        if (math) return math;
        if (br)   return '<br>';
        return m;
      });
      span.innerHTML = safe;
      if (window.renderMathInElement) {
        renderMathInElement(span, {
          delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
          throwOnError:false
        });
      }
      container.appendChild(span);
    }
  });
}

// Lance la présentation avec les questions sélectionnées
function startPresentation() {
  const questions = buildQuestionsFromSelection();
  if (!questions.length) return;
  openPresentation(questions);
}
</script>
